<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/navbar.css">
    <link rel="icon" type="image/x-icon" href="../favicon.png">
</head>

<body>
    <header>
        <div class="navbar">
            <div id="logos">
            <img src="../imgs/icon.png" alt="icone rpagina">
            <h1 id="logo"><strong>RP</strong>á<strong>G</strong>ina!</h1>
            </div>
            <nav>
                <ul class="nav-list">
                    <li id="nav-item">
                        <a href="pages/create/create.html">Criar um elemento</a>
                    </li>
                    <li id="nav-item">
                        <a href="pages/perfil/inventory.html">Inventário</a>
                    </li>
                    <li id="nav-item">
                        <a href="pages/simulator/createSim.html">Simulação</a>
                    </li>
                    <li id="nav-item2">
                        <a href="pages/perfil/account.html"><i class="fas fa-user"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

        <section class="mb-3">
            <h2 class="h6">Tema</h2>
            <form>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="theme" id="themeLight" value="light" checked>
                    <label class="form-check-label" for="themeLight">Claro</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="theme" id="themeDark" value="dark">
                    <label class="form-check-label" for="themeDark">Escuro</label>
                </div>
            </form>
        </section>

        <section class="mb-3">
            <h2 class="h6">Tamanho da fonte</h2>
            <select class="form-select w-auto" aria-label="Tamanho da fonte">
                <option value="small">Menor</option>
                <option value="normal" selected>Normal</option>
                <option value="large">Maior</option>
            </select>
        </section>

        <section class="mb-3">
            <h2 class="h6">Conta</h2>
            <ul class="list-unstyled">
                <li><a href="perfil/account.html">Alterar dados da conta</a></li>
                <li><a href="perfil/register.html">Cadastrar / Mudar de conta</a></li>
                <li><a href="perfil/account.html">Deletar conta</a></li>
            </ul>
        </section>

        <!--Base não funcional-->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
