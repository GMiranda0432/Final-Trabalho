<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../favicon.png">
</head>

<body>
    <main class="container py-4">
        <h1 class="h3 text-center mb-4">Configurações</h1>

        <nav class="mb-3">
            <ul class="list-unstyled d-flex gap-3 justify-content-center">
                <li><a href="../index.html">Início</a></li>
                <li><a href="create/create.html">Criar</a></li>
                <li><a href="perfil/inventory.html">Inventário</a></li>
            </ul>
        </nav>

        <section class="mb-3">
            <h2 class="h6">Tema</h2>
            <form>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="theme" id="themeLight" value="light" checked>
                    <label class="form-check-label" for="themeLight">Claro</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="theme" id="themeDark" value="dark">
                    <label class="form-check-label" for="themeDark">Escuro</label>
                </div>
            </form>
        </section>

        <section class="mb-3">
            <h2 class="h6">Tamanho da fonte</h2>
            <select class="form-select w-auto" aria-label="Tamanho da fonte">
                <option value="small">Menor</option>
                <option value="normal" selected>Normal</option>
                <option value="large">Maior</option>
            </select>
        </section>

        <section class="mb-3">
            <h2 class="h6">Conta</h2>
            <ul class="list-unstyled">
                <li><a href="perfil/account.html">Alterar dados da conta</a></li>
                <li><a href="perfil/register.html">Cadastrar / Mudar de conta</a></li>
                <li><a href="perfil/account.html">Deletar conta</a></li>
            </ul>
        </section>

        <!--Base não funcional-->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
