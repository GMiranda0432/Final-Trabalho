            <div class="mb-3">

                <input type="text" class="form-control" id="inNomeL" name="NomeL" required>

                    </select>

                    <option value="Floresta">Floresta</option>
                    <option value="Caverna">Caverna</option>
                    <option value="Montanha">Montanha</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" id="descricao" name="descricao" class="form-control">
            </div>

            <div class="mb-3">
                <label for="historia" class="form-label">História</label>
                <textarea id="historia" name="historia" class="form-control" rows="4"></textarea>
