<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação - Personagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.png">
</head>
<body>
    <nav>
        <ul>
            <li><a href="../perfil/inventory.html">Inventário</a></li>
            <li><a href="../simulator/createSim.html">Simular batalha</a></li>
            <li><a href="../perfil/account.html">Seu perfil</a></li>
            <li><a href="../config.html">Configurações</a></li>
        </ul>
    </nav>

    <main class="container py-4">
        <h1 class="h4 text-center mb-4">Criar Personagem</h1>

        <form id="charForm">
            <div class="mb-3">
                <label for="inPNome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="inPNome" name="inPNome" required>
            </div>

            <div class="mb-3">
                <label for="inPClasse" class="form-label">Classe</label>
                <select id="inPClasse" name="inPClasse" class="form-select">
                    <option value="Cavaleiro">Cavaleiro</option>
                    <option value="Mago">Mago</option>
                    <option value="Arqueiro">Arqueiro</option>
                    <option value="Druida">Druida</option>
                    <option value="Ladino">Ladino</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inPRaca" class="form-label">Raça</label>
                <select id="inPRaca" name="inPRaca" class="form-select">
                    <option value="Humano">Humano</option>
                    <option value="Elfo">Elfo</option>
                    <option value="Anão">Anão</option>
                    <option value="Orc">Orc</option>
                    <option value="Fada">Fada</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inPSexo" class="form-label">Sexo</label>
                <select id="inPSexo" name="inPSexo" class="form-select">
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inPDesc" class="form-label">Descrição</label>
                <input type="text" id="inPDesc" name="inPDesc" class="form-control">
            </div>

            <div class="mb-3">
                <label for="inPBio" class="form-label">Biografia</label>
                <textarea id="inPBio" name="inPBio" class="form-control" rows="5"></textarea>
            </div>

<h1>Estastíticas do personagem</h1>
            <div class="row g-3 mb-3">
                <div class="col-6 col-md-2">
                    <label class="form-label">Vida</label>
                    <input type="number" id="inPVida" name="inPVida" class="form-control" min="0" max="100" value="100">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Dano</label>
                    <input type="number" id="inPDano" name="inPDano" class="form-control" min="0" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Defesa</label>
                    <input type="number" id="inPDefesa" name="inPDefesa" class="form-control" min="0" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Sorte</label>
                    <input type="number" id="inPSorte" name="inPSorte" class="form-control" min="0" max="100" value="0">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Velocidade</label>
                    <input type="number" id="inPVelo" name="inPVelo" class="form-control" min="0" max="100" value="0">
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" id="btSalvarPersona" class="btn btn-success btn-lg">Salvar personagem</button>
            </div>
        </form>

        <div id="outSaidaFinal"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../JS/storage.js"></script>
    <script src="../../JS/script.js"></script>
</body>

</html>
