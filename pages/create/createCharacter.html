<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação - Personagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/navbar.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.png">
</head>

<body>
    <header>
        <div class="navbar">
            <div id="logos">
                <img src="../../imgs/icon.png" alt="icone rpagina">
                <h1 id="logo"><strong>RP</strong>á<strong>G</strong>ina!</h1>
            </div>

            <nav>
                <ul class="nav-list">
                    <li id="nav-item">
                        <a href="../../index.html">Início</a>
                    </li>
                    <li id="nav-item">
                        <a href="../perfil/inventory.html">Inventário</a>
                    </li>
                    <li id="nav-item">
                        <a href="../simulator/createSim.html">Simulação</a>
                    </li>
                    <li id="nav-item2">
                        <a href="pages/perfil/account.html"><i class="fas fa-user"></i></a>
                    </li>
                    <li id="nav-item2">
                        <a href="pages/config.html"><i class="fas fa-gear"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container py-4">
        <h1 class="h4 text-center mb-4">Criar Personagem</h1>

        <form id="personaForm">
            <div class="mb-3">
                <label for="inNomeP" class="form-label">Nome</label>
                <input type="text" class="form-control" id="inNomeP" name="nomeP" required>
            </div>

            <div class="mb-3">
                <label for="inClasseP" class="form-label">Classe</label>
                <select id="inClasseP" name="classeP" class="form-select" required>
                    <option value="Cavaleiro">Cavaleiro</option>
                    <option value="Mago">Mago</option>
                    <option value="Arqueiro">Arqueiro</option>
                    <option value="Druida">Druida</option>
                    <option value="Ladino">Ladino</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inRacaP" class="form-label">Raça</label>
                <select id="inRacaP" name="racaP" class="form-select" required>
                    <option value="Humano">Humano</option>
                    <option value="Elfo">Elfo</option>
                    <option value="Anão">Anão</option>
                    <option value="Orc">Orc</option>
                    <option value="Fada">Fada</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inSexoP" class="form-label">Sexo</label>
                <select id="inSexoP" name="sexoP" class="form-select" required>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="inDescP" class="form-label">Descrição</label>
                <input type="text" id="inDescP" name="descP" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="inBioP" class="form-label">Biografia</label>
                <textarea id="inBioP" name="bioP" class="form-control" rows="5" required> </textarea>
            </div>
<h2 class="h5 mt-4">
Estatísticas do personagem
</h2>
            <div class="row g-3 mb-3">
                <div class="col-6 col-md-2">
                    <label for="inVidaP" class="form-label">Vida</label>
                    <input type="number" id="inVidaP" name="vidaP" class="form-control" min="0" max="100" value="100">
                </div>
                <div class="col-6 col-md-2">
                    <label for="inDanoP" class="form-label">Dano</label>
                    <input type="number" id="inDanoP" name="danoP" class="form-control" min="0" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label for="inDefP" class="form-label">Defesa</label>
                    <input type="number" id="inDefP" name="defP" class="form-control" min="0" max="100" value="20">
                </div>
                <div class="col-6 col-md-2">
                    <label for="inSorteP" class="form-label">Sorte</label>
                    <input type="number" id="inSorteP" name="sorteP" class="form-control" min="0" max="100" value="5">
                </div>
                <div class="col-6 col-md-2">
                    <label for="inVeloP" class="form-label">Velocidade</label>
                    <input type="number" id="inVeloP" name="veloP" class="form-control" min="0" max="100" value="60">
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">Salvar personagem</button>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../JS/storage.js"></script>
    <script src="../../JS/script.js"></script>
</body>

</html>
