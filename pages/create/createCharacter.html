<html lang="pt-br">

<head>
    <meta charset="UTF-8">

        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/navbar.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.png">
</head>
<body>
    <header>
    <div class="navbar">
        <div id="logos">
            <img src="../../imgs/icon.png" alt="icone rpagina">
            <h1 id="logo"><strong>RP</strong>á<strong>G</strong>ina!</h1>
            </div>

        <nav>
            <ul class="nav-list">
                <li id="nav-item">
                    <a href="../../index.html">Início</a>
                </li>
                <li id="nav-item">
                    <a href="../perfil/inventory.html">Inventário</a>
                </li>
                <li id="nav-item">
                    <a href="../simulator/createSim.html">Simulação</a>
                </li>
                    <li id="nav-item2">
                        <a href="pages/perfil/account.html"><i class="fas fa-user"></i></a>
                    </li>
                    <li id="nav-item2">
                        <a href="pages/config.html"><i class="fas fa-gear"></i></a>
                    </li>
            </ul>
        </nav>
        </div>
    </header>
    
    <main class="container py-4">
        <h1 class="h4 text-center mb-4">Criar Personagem</h1>

        <form id="charForm">
            <div class="mb-3">
                <label for="name" class="form-label">Nome</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="classe" class="form-label">Classe</label>
                <select id="classe" name="classe" class="form-select">
                    <option value="Cavaleiro">Cavaleiro</option>
                    <option value="Mago">Mago</option>
                    <option value="Arqueiro">Arqueiro</option>
                    <option value="Druida">Druida</option>
                    <option value="Ladino">Ladino</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="raca" class="form-label">Raça</label>
                <select id="raca" name="raca" class="form-select">
                    <option value="Humano">Humano</option>
                    <option value="Elfo">Elfo</option>
                    <option value="Anão">Anão</option>
                    <option value="Orc">Orc</option>
                    <option value="Fada">Fada</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="sexo" class="form-label">Sexo</label>
                <select id="sexo" name="sexo" class="form-select">
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" id="descricao" name="descricao" class="form-control">
            </div>

            <div class="mb-3">
                <label for="biografia" class="form-label">Biografia</label>
                <textarea id="biografia" name="biografia" class="form-control" rows="4"></textarea>
            </div>

<h1>Estastíticas do personagem</h1>
            <div class="row g-3 mb-3">
                <div class="col-6 col-md-2">
                    <label class="form-label">Vida</label>
                    <input type="number" id="vida" name="vida" class="form-control" min="0" max="100" value="100">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Dano</label>
                    <input type="number" id="dano" name="dano" class="form-control" min="0" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Defesa</label>
                    <input type="number" id="defesa" name="defesa" class="form-control" min="0" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Sorte</label>
                    <input type="number" id="sorte" name="sorte" class="form-control" min="0" max="100" value="0">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Velocidade</label>
                    <input type="number" id="velocidade" name="velocidade" class="form-control" min="0" max="100" value="0">
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">Salvar personagem</button>
            </div>
        </form>

        <div id="msg" class="mt-3"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../JS/storage.js"></script>
    <script src="../../JS/script.js"></script>
</body>

</html>
