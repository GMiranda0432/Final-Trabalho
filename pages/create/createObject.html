<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação - Objeto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.png">
</head>
<body>
    <nav>
        <ul>
            <li><a href="../perfil/inventory.html">Inventário</a></li>
            <li><a href="../simulator/createSim.html">Simular batalha</a></li>
            <li><a href="../perfil/account.html">Seu perfil</a></li>
            <li><a href="../config.html">Configurações</a></li>
        </ul>
    </nav>

    <main class="container py-4">
        <h1 class="h4 text-center mb-4">Criar Objeto</h1>

        <form id="charForm">
            <div class="mb-3">
                <label for="name" class="form-label">Nome</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="classe" class="form-label">Classe</label>
                <select id="classe" name="classe" class="form-select">
                    <option value="Dano">Dano</option>
                    <option value="Suporte">Suporte</option>
                    <option value="Tanque">Tanque</option>
                    <option value="Mobilidade">Mobilidade</option>
                    <option value="Benção">Benção</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" name="tipo" class="form-select">
                    <option value="Espada">Arma</option>
                    <option value="Escudo">Armadura</option>
                    <option value="Cetro">Cetro</option>
                    <option value="Jóia">Jóia</option>
                    <option value="Roupa">Roupa</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" id="descricao" name="descricao" class="form-control">
            </div>

            <div class="mb-3">
                <label for="historia" class="form-label">História</label>
                <textarea id="historia" name="historia" class="form-control" rows="4"></textarea>
            </div>
<h1>Status - Como afeta seu portador, de forma positiva e/ou negativa</h1>
            <div class="row g-3 mb-3">
                <div class="col-6 col-md-2">
                    <label class="form-label">Vida</label>
                    <input type="number" id="vida" name="vida" class="form-control" min="-100" max="100" value="100">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Dano</label>
                    <input type="number" id="dano" name="dano" class="form-control" min="-100" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Defesa</label>
                    <input type="number" id="defesa" name="defesa" class="form-control" min="-100" max="100" value="10">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Sorte</label>
                    <input type="number" id="sorte" name="sorte" class="form-control" min="-100" max="100" value="5">
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Velocidade</label>
                    <input type="number" id="velocidade" name="velocidade" class="form-control" min="-100" max="100" value="15">
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">Salvar Objeto</button>
            </div>
        </form>

        <div id="msg" class="mt-3"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../JS/storage.js"></script>
    <script src="../../JS/script.js"></script>
</body>

</html>delivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/script.js"></script>
</body>

</html>
