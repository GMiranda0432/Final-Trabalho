<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.png">
</head>
<body>
    <h1>Crie seu elemento</h1>
    <nav>
        <ul>
            <li><a href="perfil/inventory.html">Inventário</a></li>
            <li><a href="simulator/createSim.html">Simular batalha</a></li>
            <li><a href="perfil/account.html">Seu perfil</a></li>
            <li><a href="config.html">Configurações</a></li>
        </ul>
    </nav>

    <main>
        <form action="#" method="post">
            <label for="nome_filme">Nome do Personagem:</label><br>
            <input type="text" id="nome_filme" name="nome_filme" required><br><br>

            <label for="nome_empresa">Nome da sua empresa:</label><br>
            <input type="text" id="nome_empresa" name="nome_empresa" required><br><br>

            <label for="email_responsavel">Email:</label><br>
            <input type="email" id="email_responsavel" name="email_responsavel" required
                oninvalid="this.setCustomValidity('Por favor, insira um email válido')"><br><br>

            <label for="telefone">Telefone: (XX) XXXXX-XXXX</label><br>
            <input type="text" id="telefone" name="telefone" required
                oninvalid="this.setCustomValidity('Por favor, insira um telefone válido no formato XX-XXXXX-XXXX')"><br><br>
            <label for="cep">Cep da exibição: <br> (XXXXX-XXX)</label><br>
            <input type="text" id="cep" name="cep" required
                oninvalid="this.setCustomValidity('Por favor, diga um CEP válido no formato XXXXX-XXX, não deixe em branco')"><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" title="A senha deve ter pelo menos 6 caracteres" required
                oninvalid="this.setCustomValidity('Por favor, insira uma senha válida, não é dificil, -tive dificuldade-')"><br><br>

            <label for="ano">Ano de Lançamento:</label><br>
            <input type="number" id="ano" name="ano_lancamento" min="1900" max="2026"
                oninvalid="this.setCustomValidity('Por favor, insira um ano válido entre 1900 e 2026')"><br><br>


            <label for="genero">Gênero:</label><br>
            <select id="genero" name="genero">
                <option value="acao">Ação</option>
                <option value="comedia">Comédia</option>
                <option value="terror">Terror</option>
                <option value="romance">Romance</option>
                <option value="aventura">Aventura</option>
                <option value="fantasia">Fantasia</option>
            </select><br><br>

            <label for="subgenero">Sub-Gênero:</label><br>
            <select id="subgenero" name="subgenero">
                <option value="acao">Ação</option>
                <option value="comedia">Comédia</option>
                <option value="terror">Terror</option>
                <option value="romance">Romance</option>
                <option value="aventura">Aventura</option>
                <option value="fantasia">Fantasia</option>
            </select><br><br>

            <label for="agencia">Agência do filme:</label><br>
            <select id="agencia" name="agencia">
                <option value="paramount">Paramount</option>
                <option value="comedia">Cinemark</option>
                <option value="netflix">Netflix</option>
                <option value="hbo">HBO</option>
                <option value="warner">Warner</option>
                <option value="disney">Disney</option>
            </select><br><br>


            <p>Classificação Indicativa:</p>
            <input type="radio" id="livre" name="classificacao" value="livre">
            <label for="livre">Livre</label><br>
            <input type="radio" id="maior10" name="classificacao" value="10+">
            <label for="maior10">10+</label><br>
            <input type="radio" id="maior12" name="classificacao" value="12+">
            <label for="maior12">12+</label><br>
            <input type="radio" id="maior16" name="classificacao" value="14+">
            <label for="maior16">14+</label><br>
            <input type="radio" id="maior18" name="classificacao" value="16+">
            <label for="maior18">16+</label><br>
            <input type="radio" id="maior18" name="classificacao" value="18+">
            <label for="maior18">18+</label><br><br>


            <p>Características do Filme:</p>
            <input type="checkbox" name="caracteristicas" value="dublado"> Dublado<br>
            <input type="checkbox" name="caracteristicas" value="legendado"> Legendado<br>
            <input type="checkbox" name="caracteristicas" value="3d"> 3D<br><br>


            <label for="descricao">Descrição:</label><br>
            <textarea id="descricao" name="descricao" rows="4" cols="40" minlength="10" required></textarea><br><br>

            <label for="duracao">Duração (em minutos):</label><br>
            <input type="number" id="duracao" name="duracao" min="1" required><br><br>

            <label for="cartaz">URL do Cartaz do Filme:</label><br>
            <input type="text" id="cartaz" name="cartaz"><br><br>

            <label for="diainicio">Dia de estreia:</label><br>
            <input type="date" id="diainicio" name="diainicio" required><br><br>

            <label for="diafim">Último dia no cartaz:</label><br>
            <input type="date" id="diafim" name="diafim" required><br><br>

            <input type="submit" value="Enviar">
        </form>
        </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/script.js"></script>
</body>

</html>
