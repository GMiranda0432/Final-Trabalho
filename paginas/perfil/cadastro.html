<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href=".../../CSS/style.css">
    <link rel="stylesheet" href="../../CSS/navbar.css">
    <link rel="icon" type="image/x-icon" href="../../recursos/imgs/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Tiny5&display=swap" rel="stylesheet">
</head>

<body>
    <main class="container py-4">
        <nav class="mb-3">
            <ul class="list-unstyled d-flex gap-3 justify-content-center">
                <li><a href="../../index.html">Início</a></li>
                <li><a href="login.html">Fazer Login</a></li>
            </ul>
        </nav>

        <h1 class="h4 text-center mb-4">Cadastre-se</h1>

        <form class="mx-auto" style="max-width:520px;" action="#" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control">
            </div>
            <div class="mb-3">
                <label for="usuario" class="form-label">Nome de usuário <span class="text-danger">*</span></label>
                <input type="text" id="usuario" name="usuario" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="senha" class="form-label">Senha <span class="text-danger">*</span></label>
                <input type="password" id="senha" name="senha" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="foto" class="form-label">Foto de perfil</label>
                <input type="file" id="foto" name="foto" class="form-control">
            </div>
            <div class="mb-3">
                <label for="pronome" class="form-label">Pronomes</label>
                <input type="text" id="pronome" name="pronome" class="form-control"
                    placeholder="ex: ele/dele, ela/dela, elu/delu">
            </div>
            <div class="mb-3">
                <label for="bio" class="form-label">Biografia</label>
                <textarea id="bio" name="bio" class="form-control" rows="4"></textarea>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Criar Conta</button>
            </div>
            <p class="small text-muted mt-2">Os campos <span class="text-danger">*</span> são obrigatórios.</p>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </main>
</body>

</html>
