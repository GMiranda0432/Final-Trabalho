</head>

<body>

    <section class="mb-3">
        <h2 class="h6">Tema do site</h2>
        <form>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="theme" id="temaDia" value="dia" checked>
                <label class="form-check-label" for="themeLight">Dia</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="theme" id="temaNoite" value="noite">
                <label class="form-check-label" for="themeDark">Noite</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="theme" id="temaManha" value="manha">
                <label class="form-check-label" for="themeDark">Manha</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="theme" id="temaTarde" value="tarde">
                <label class="form-check-label" for="themeDark">Tarde</label>
            </div>
        </form>
    </section>

    <section class="mb-3">
        <h2 class="h6">Tamanho da fonte</h2>
        <select class="form-select w-auto" aria-label="Tamanho da fonte">
            <option value="small">Menor</option>
            <option value="normal" selected>Normal</option>
            <option value="large">Maior</option>
        </select>
    </section>

    <section class="mb-3">
        <h2 class="h6">Conta</h2>
        <ul class="list-unstyled">
            <li><a href="../error.html">Alterar dados da conta</a></li>
            <li><a href="../error.html">Cadastrar / Mudar de conta</a></li>
            <li><a href="../error.html">Deletar conta</a></li>
            <li><a href="../../index.html">Início</a></li>
        </ul>
    </section>

    <!--Base não funcional-->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/script.js"></script>
</body>

</html>
