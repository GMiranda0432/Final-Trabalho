    <main class="container py-4">
        <h1 class="h4 text-center mb-4">Criar Local</h1>

        <form id="sceneForm">
            <div class="mb-3">
                <label for="inNomeL" class="form-label">Nome</label>
                <input type="text" class="form-control" id="inNomeL" name="NomeL" required>
            </div>

            <div class="mb-3">
                <label for="inTamanhoL" class="form-label">Tamanho</label>
                <select id="inTamanhoL" name="TamanhoL" class="form-select">
                    <option value="pequeno">Pequeno</option>
                    <option value="medio">Médio</option>
                    <option value="grande">Grande</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" name="tipo" class="form-select">
                    <option value="ilha">Ilha</option>
                    <option value="estrutura">Estrutura</option>
                    <option value="floresta">Floresta</option>
                    <option value="caverna">Caverna</option>
                    <option value="montanha">Montanha</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" id="descricao" name="descricao" class="form-control">
            </div>

            <div class="mb-3">
                <label for="historia" class="form-label">História</label>
                <textarea id="historia" name="historia" class="form-control" rows="4"></textarea>
            </div>
